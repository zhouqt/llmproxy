services:
  llmproxy:
    build: .
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config.yaml:/etc/llmproxy/config.yaml:ro
      - llmproxy-data:/root/.local/share/llmproxy
    # Secrets and per-host config come from .env (gitignored). Copy
    # .env.example -> .env and fill in real values before `docker
    # compose up`. `env_file` lets us keep this YAML free of any
    # host-specific data so the file can be pushed without conflicts.
    env_file:
      - .env
    environment:
      # Non-secret defaults only. Override per-host via .env if needed.
      - RUST_LOG=${RUST_LOG:-info}
    restart: unless-stopped

volumes:
  llmproxy-data:

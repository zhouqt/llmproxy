services:
  llmproxy:
    build: .
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config.yaml:/etc/llmproxy/config.yaml:ro
      - llmproxy-data:/root/.local/share/llmproxy
    environment:
      - LLMPROXY_API_KEY=${LLMPROXY_API_KEY:-sk-llmproxy-1234}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
    restart: unless-stopped

volumes:
  llmproxy-data:

# LLM Proxy configuration example.
#
# Copy to config.yaml, fill in API keys (or set as env vars), then run:
#   cargo run --release -- --config config.yaml
#
# Environment variable expansion: any `${VAR}` or `$VAR` reference is
# expanded from the process environment at startup. This is how API keys
# are typically injected.

# ───────────────────────────────────────────────────────────────────────
# server: incoming HTTP listener
# ───────────────────────────────────────────────────────────────────────
server:
  # Address:port the proxy binds to. Use 127.0.0.1 to keep it
  # local-only; 0.0.0.0 to expose on all interfaces.
  # Default if omitted: 127.0.0.1:8080.
  listen: "0.0.0.0:8080"

  # Shared bearer token clients send via `Authorization: Bearer <key>`
  # (or `x-api-key: <key>`). Supports ${ENV_VAR} expansion. Leave unset
  # to disable authentication — only safe when listen is bound to
  # 127.0.0.1, otherwise any reachable client can use the proxy.
  api_key: "${LLMPROXY_API_KEY}"

# ───────────────────────────────────────────────────────────────────────
# proxy: outgoing proxy used by providers with `use_proxy: true`
# ───────────────────────────────────────────────────────────────────────
# Per-provider opt-in via `use_proxy: true` on each provider below.
# Any provider without it bypasses the global proxy and connects
# directly. Defaults to false, so by default no provider uses the
# proxy — enable it explicitly for the ones that need it.
#
# Supported schemes in `url`:
#   socks5h://host:port  — SOCKS5, remote DNS resolution (recommended)
#   socks5://host:port   — SOCKS5, local DNS resolution
#   http://host:port     — HTTP CONNECT
#   https://host:port    — HTTPS CONNECT
#
# proxy:
#   url: "socks5h://192.168.122.1:6666"
#   # timeout_secs: per-request timeout for proxied providers (seconds).
#   # Direct providers inherit this too — see build_direct_client.
#   # Default if omitted: 600.
#   timeout_secs: 600

# ───────────────────────────────────────────────────────────────────────
# providers: backend LLM services the proxy can route to
# ───────────────────────────────────────────────────────────────────────
# Each provider is keyed by `name`; the `models:` section below refers
# to providers by this name. The `type` field selects which struct
# shape the rest of the entry must follow.

providers:
  # ─── github_copilot ──────────────────────────────────────────────────
  # Talks to GitHub Copilot's API using OAuth device flow. The first
  # request after a fresh install will print a one-time code; visit the
  # printed URL, paste the code, and the resulting token persists at:
  #   $XDG_DATA_HOME/llmproxy/github_token.json
  # (defaults to ~/.local/share/llmproxy/github_token.json)
  #
  # Routing: the proxy auto-routes by model name. Any incoming model
  # starting with "gpt-5" is dispatched to Copilot's /v1/responses
  # endpoint (Responses API), since Copilot rejects /v1/chat/completions
  # for GPT-5.x with `unsupported_api_for_model`. All other model names
  # go to /v1/chat/completions as before. No configuration flag is
  # needed — the dispatch happens per-request.
  #
  # Fields:
  #   name           — internal key referenced by `models:`
  #   vscode_version — User-Agent string sent to GitHub. Some Copilot
  #                    endpoints gate access by client version.
  #                    Default: "1.95.0".
  #   account_type   — "individual" | "business" | "enterprise".
  #                    Determines which Copilot SKU the proxy targets.
  #                    Default: "individual".
  #   model_rewrite  — optional map: incoming-model-name → upstream-model-name.
  #                    Empty (default) accepts any model name verbatim —
  #                    the proxy forwards the Anthropic `model` value as-is
  #                    to Copilot's Chat Completions endpoint. A non-empty
  #                    table is an explicit allow-list: only model names
  #                    present as keys are considered servable, and the
  #                    mapped value is sent upstream (useful when routing
  #                    `claude-sonnet-4.6` to a Copilot-side alias).
  #   use_proxy      — see top-of-file proxy section. Default: false.
  - name: copilot
    type: github_copilot
    vscode_version: "1.95.0"
    account_type: individual
    model_rewrite: {}
    use_proxy: true

  # ─── anthropic (native Anthropic Messages passthrough) ──────────────
  # Talks to any backend exposing the native Anthropic Messages API
  # (i.e. POST /v1/messages with anthropic-version header). The proxy
  # forwards the request body verbatim and streams the response
  # unchanged — no request/response translation. Use this for
  # OpenRouter's `/api/v1/messages` endpoint, AWS Bedrock with an
  # Anthropic-compatible adapter, or any other gateway speaking
  # Anthropic Messages without conversion.
  #
  # For OpenAI Chat Completions-style upstreams use `type: openai_compat`
  # below instead.
  #
  # Fields:
  #   name          — internal key
  #   api_key       — bearer token (supports ${ENV_VAR})
  #   api_base      — base URL up to but not including `/v1/messages`,
  #                   defaults to https://openrouter.ai/api/v1
  #   model_rewrite — optional map: incoming-model-name → upstream-model-name.
  #                   Empty (default) accepts any model name verbatim;
  #                   a non-empty table is an explicit allow-list (the
  #                   router skips this provider for unmapped names).
  #   use_proxy     — see proxy section. Default: false.

  - name: openrouter_anthropic
    type: anthropic
    api_key: "${OPENROUTER_API_KEY}"
    api_base: "https://openrouter.ai/api/v1"
    use_proxy: true

  - name: minimax
    type: anthropic
    api_key: "${MINIMAX_API_KEY}"
    api_base: "https://api.minimaxi.com/anthropic"
    model_rewrite:
      "claude-haiku-4.6":  "MiniMax-M2.7"
      "claude-sonnet-4.6": "MiniMax-M3"
      "claude-opus-4.6":    "MiniMax-M3"

  # ─── openai_compat ───────────────────────────────────────────────────
  # Any OpenAI-Chat-Completions-compatible endpoint. Used for DeepSeek,
  # MiniMax, OpenCode Zen, and similar gateways.
  #
  # Fields:
  #   name          — internal key
  #   api_key       — Bearer token (supports ${ENV_VAR})
  #   api_base      — base URL up to but not including /chat/completions,
  #                  e.g. https://api.deepseek.com/v1
  #   model_rewrite — optional map: incoming-Claude-name → upstream-model-name.
  #                  If the requested model name has an entry here, the
  #                  proxy sends the rewritten value upstream. If absent,
  #                  the original name is forwarded as-is. Providers with
  #                  an empty rewrite table accept any model name verbatim
  #                  (the router skips them when a non-empty upstream-
  #                  model mapping is required — see `can_serve_model`).
  #   use_proxy     — see proxy section. Default: false.

  - name: deepseek
    type: openai_compat
    api_key: "${DEEPSEEK_API_KEY}"
    api_base: "https://api.deepseek.com/v1"
    model_rewrite:
      "claude-haiku-4.6":  "deepseek-v4-flash"
      "claude-sonnet-4.6": "deepseek-v4-flash"
      "claude-opus-4.6":    "deepseek-v4-pro"

  # OpenCode Zen — free-tier public LLM gateway. Free accounts can only
  # call `-free` models (hy3-free, mimo-v2.5-free, deepseek-v4-flash-free,
  # ...); paid-model requests return 401 CreditsError. The rewrites below
  # map Claude-style names to free model IDs so the provider works as a
  # fallback for paid Claude models.
  - name: opencode_zen
    type: openai_compat
    api_key: "${OPENCODE_API_KEY}"
    api_base: "https://opencode.ai/zen/v1"
    model_rewrite:
      "deepseek-v4-flash-free": "deepseek-v4-flash-free"
      "claude-haiku-4.6": "deepseek-v4-flash-free"
      "claude-sonnet-4.6": "deepseek-v4-flash-free"
      "claude-opus-4.6": "deepseek-v4-flash-free"

  # OpenRouter Chat-Completions side. Pairs with the `anthropic`
  # openrouter_anthropic provider above for fallback.
  - name: openrouter_openai
    type: openai_compat
    api_key: "${OPENROUTER_API_KEY}"
    api_base: "https://openrouter.ai/api/v1"
    model_rewrite:
      "gpt-4o":            "openai/gpt-4o"
      "claude-haiku-4.6":  "anthropic/claude-haiku-4.5"
      "claude-sonnet-4.6": "anthropic/claude-sonnet-4.5"
      "claude-opus-4.6":   "anthropic/claude-opus-4.7"

  # ─── openai_responses ────────────────────────────────────────────────
  # Any backend exposing OpenAI's Responses API (POST /v1/responses).
  # Used for direct OpenAI GPT-5.x access (which requires /v1/responses
  # rather than /v1/chat/completions) and any reverse proxy that exposes
  # the same endpoint.
  #
  # Conversion is Anthropic Messages ↔ Responses API: system →
  # instructions, messages[] → flat input[] (with tool_use/result folded
  # into function_call / function_call_output items), thinking.budget_tokens
  # → reasoning.effort. Streaming is translated event-by-event
  # (response.output_text.delta → content_block_delta,
  # response.function_call_arguments.delta → input_json_delta, etc.).
  #
  # Fields:
  #   name          — internal key
  #   api_key       — Bearer token (supports ${ENV_VAR})
  #   api_base      — base URL up to but not including /responses,
  #                   e.g. https://api.openai.com/v1
  #   model_rewrite — optional map: incoming-model-name → upstream-model-name.
  #                   Empty (default) accepts any model name verbatim;
  #                   a non-empty table is an explicit allow-list.
  #   use_proxy     — see proxy section. Default: false.
  #
  # NOTE: GitHub Copilot also speaks Responses API but routes automatically
  # by model name — see the github_copilot section above. Any incoming
  # model starting with "gpt-5" is dispatched to /v1/responses; all other
  # names go to /v1/chat/completions. No configuration flag needed.
  - name: openai_direct
    type: openai_responses
    api_key: "${OPENAI_API_KEY}"
    api_base: "https://api.openai.com/v1"
    model_rewrite:
      "gpt-5":      "gpt-5"
      "gpt-5-mini": "gpt-5-mini"
      "gpt-5.5":    "gpt-5.5"
    use_proxy: false

# ───────────────────────────────────────────────────────────────────────
# models: client-facing model names mapped to a routing chain
# ───────────────────────────────────────────────────────────────────────
# `name` is what clients send in the `model` field of /v1/messages.
# The proxy walks the chain [primary, fallback_chain...] in order,
# skipping any provider currently in cooldown, and returns the first
# successful response.
# YAML parsers accept duplicate keys; the last one wins. Left in to
# preserve any operator overrides that target this exact slot.
#
# Fields:
#   name                    — client-facing model name (the value clients
#                             send in `model`). Any string.
#   primary                 — provider name tried first.
#   fallback_chain          — ordered list of provider names tried when
#                             the current one returns a cooldownable
#                             error (429, 401, 408, 404, 5xx).
#   cooldown_seconds        — TTL on the per-provider cooldown set after
#                             a cooldownable error. Default: 300 (5 min).
#                             After the TTL the provider is retried.
#   max_retries_per_provider — how many times to retry the same provider
#                             (across cooldown cycles) before moving to
#                             the next in the chain. Default: 2.
#   max_retries_total       — overall cap across the whole chain. When
#                             reached the request fails with
#                             AllProvidersFailed carrying the last
#                             upstream error. Default: 2.
models:
  - name: claude-haiku-4.6
    primary: deepseek
    fallback_chain:
      - copilot
    cooldown_seconds: 300
    max_retries_per_provider: 2

  - name: claude-sonnet-4.6
    primary: deepseek
    fallback_chain:
      - openrouter_openai
      - copilot
      - deepseek
      - minimax
    cooldown_seconds: 300
    max_retries_per_provider: 2

  - name: claude-opus-4.6
    primary: openrouter_anthropic
    fallback_chain: [openrouter_openai, deepseek, minimax, copilot]
    cooldown_seconds: 300

  - name: gpt-4o
    primary: openrouter_openai
    fallback_chain: [copilot, deepseek]

  # GPT-5.x routes through `/v1/responses` automatically. Both providers
  # below speak the Responses endpoint:
  #   - openai_direct hits api.openai.com/v1/responses directly
  #   - copilot's auto-routing sends gpt-5 to api.githubcopilot.com/responses
  - name: gpt-5
    primary: openai_direct
    fallback_chain:
      - copilot

  - name: gpt-5-mini
    primary: openai_direct

  - name: gpt-5.5
    primary: openai_direct
    fallback_chain:
      - copilot

  - name: deepseek-v4-flash-free
    primary: opencode_zen

# ───────────────────────────────────────────────────────────────────────
# logging
# ───────────────────────────────────────────────────────────────────────
logging:
  # level: trace | debug | info | warn | error (RUST_LOG syntax also
  # accepted via env var, e.g. RUST_LOG=llmproxy=debug,tower_http=info).
  level: info
  # format: pretty (default, human-readable) | json (one structured
  # JSON object per line, suitable for log aggregators).
  format: pretty
